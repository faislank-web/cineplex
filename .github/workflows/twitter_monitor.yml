name: Twitter Monitor Workflow

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  run-twitter-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Twitter Monitor
        # Pastikan ini menunjuk ke file python monitor Anda
        run: python twitter_monitor.py 

      - name: Save Twitter History
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add sent_tweets.txt
          git commit -m "Update twitter history [skip ci]" || echo "No changes"
          git push
