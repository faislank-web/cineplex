name: Twitter Monitor Bot

on:
  schedule:
    - cron: '*/30 * * * *' # Berjalan otomatis setiap 30 menit
  workflow_dispatch:      # Tombol manual untuk tes

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Izin wajib untuk simpan history

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Mengambil seluruh riwayat agar pull aman

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Scan
        env:
          TWITTER_BOT_TOKEN: ${{ secrets.TWITTER_BOT_TOKEN }}
        run: python twitter_monitor.py

      - name: Save History
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Ambil perubahan terbaru dari server agar tidak ditolak (rejected)
          git pull origin main --rebase
          
          # Cek jika ada perubahan pada file history
          if [ -f sent_tweets.txt ]; then
            git add sent_tweets.txt
            git commit -m "Update history twitter [skip ci]" || echo "No changes"
            git push origin main
          fi
