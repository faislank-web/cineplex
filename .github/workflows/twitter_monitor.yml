name: Twitter Monitor Bot

on:
  schedule:
    - cron: '*/30 * * * *' # Cek setiap 30 menit
  workflow_dispatch:      # Tombol manual

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Scan
        env:
          TWITTER_BOT_TOKEN: ${{ secrets.TWITTER_BOT_TOKEN }}
        run: python twitter_monitor.py

      - name: Save History
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Ambil data terbaru dari server tanpa rebase yang bikin pusing
          git fetch origin main
          
          # Cek apakah ada perubahan di sent_tweets.txt
          if [ -f sent_tweets.txt ]; then
            git add sent_tweets.txt
            # Commit dengan pesan unik agar tidak dianggap duplikat
            git commit -m "Update history twitter [skip ci]" || echo "No changes to commit"
            
            # PUSH PAKSA (Force) agar tidak ditolak/rejected oleh GitHub
            git push origin main --force
          fi
            git commit -m "Update history twitter [skip ci]" || echo "No changes"
            git push origin main
          fi
