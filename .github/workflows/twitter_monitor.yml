name: Twitter Monitor Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Scan
        env:
          TWITTER_BOT_TOKEN: ${{ secrets.TWITTER_BOT_TOKEN }}
        run: python twitter_monitor.py

      - name: Save History
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add sent_tweets.txt
          git commit -m "Update history twitter" || echo "No new tweets"
          git push
