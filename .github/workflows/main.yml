name: Bot RSS Movie 24/7

on:
  schedule:
    # Berjalan otomatis setiap 30 menit
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Memungkinkan kamu klik "Run Workflow" manual buat tes

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # Izin wajib agar bot bisa simpan history ke last_link.txt
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests feedparser beautifulsoup4

      - name: Run RSS Bot
        run: python bot_rss.py

      - name: Save Progress (Commit last_link.txt)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add last_link.txt
          # Commit hanya jika ada perubahan file (film baru masuk)
          git commit -m "Update history: Film baru terkirim" || echo "Tidak ada film baru"
          git push
