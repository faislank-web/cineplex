name: Cineplex Auto Bot
on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Libs
        run: pip install feedparser requests
        
      - name: Execute Script
        run: python bot_rss.py
        
      - name: Save Progress
        run: |
          git config --global user.name "GitHub-Actions"
          git config --global user.email "actions@github.com"
          git add last_link.txt
          git commit -m "Update history [skip ci]" || exit 0
          git push
