name: Bot RSS Movie 24/7

on:
  schedule:
    # Menjalankan bot setiap 30 menit otomatis
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Memungkinkan kamu menjalankan bot secara manual kapan saja

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # Izin penting agar GitHub bisa mengupdate file last_link.txt di repo kamu
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install feedparser requests

      - name: Run RSS Bot
        run: python bot_rss.py

      - name: Save Progress (Commit last_link.txt)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add last_link.txt
          # Commit hanya jika ada perubahan pada file
          git commit -m "Update history: Film baru terkirim" || echo "Tidak ada film baru untuk disimpan"
          git push
